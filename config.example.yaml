# Example configuration for LLM Router Advanced

load_balancer: smart  # round_robin, random, least_connections, weighted, cost_optimized, smart
default_timeout: 60
max_retries: 3
retry_delay: 1.0

# Advanced features
cache_enabled: true
cache_ttl: 3600  # 1 hour
cache_max_size: 1000
redis_url: redis://localhost:6379  # Optional: for distributed cache

smart_routing: true  # Auto-select model based on content
cost_optimization: true  # Auto-select cheapest model

# Multi-tenant
multi_tenant: true
tenants:
  default:
    tenant_id: default
    rate_limit: 60
    monthly_budget: 100.0
    endpoints: []
    enabled: true
  premium:
    tenant_id: premium
    rate_limit: 200
    monthly_budget: 500.0
    endpoints: []
    enabled: true

# Hot reload config file
config_watch: false

# Rate limiting (global)
rate_limit: 100  # requests per minute

# Health check
health_check_interval: 60

# Endpoints
endpoints:
  - name: openai-gpt4
    provider: openai
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    model: gpt-4
    weight: 1
    timeout: 60
    max_retries: 3
    enabled: true
    cost_per_1k_tokens: 0.03
    capabilities:
      - reasoning
      - creative
    max_tokens: 8192

  - name: openai-gpt35
    provider: openai
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    model: gpt-3.5-turbo
    weight: 2
    timeout: 30
    max_retries: 3
    enabled: true
    cost_per_1k_tokens: 0.002
    capabilities:
      - creative
    max_tokens: 4096

